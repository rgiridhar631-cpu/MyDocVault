# .gitlab-ci.yml - MyDocVault CI/CD Pipeline
# Cross-platform runner compatible (runs on Linux & Windows)

stages:
  - install
  - format
  - lint
  - type_check
  - secret_scan
  - commit_check
  - syntax_check
  - security_audit
  - test
  - coverage
  - build
  - dependency_check
  - artifact_package
  - integration_check
  - deploy_notice


install_dependencies:
  stage: install
  script:
    - echo "Installing dependencies..."
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

formatting_check:
  stage: format
  script:
    - echo "Verifying Prettier code formatting..."
    - npm run format:check

lint_code:
  stage: lint
  script:
    - echo "Running ESLint styles check..."
    - npm run lint

type_checking:
  stage: type_check
  script:
    - echo "Running TypeScript/JSDoc type checking..."
    - npm run type-check

secret_scanning:
  stage: secret_scan
  script:
    - echo "Scanning code files for hardcoded secrets..."
    - node secret-scan.js

commit_message_checking:
  stage: commit_check
  script:
    - echo "Checking commit message semantics..."
    - node check-commits.js

syntax_checking:
  stage: syntax_check
  script:
    - echo "Verifying all JavaScript files parse correctly..."
    - node syntax-check.js

security_auditing:
  stage: security_audit
  script:
    - echo "Running npm package security audit..."
    - npm audit --audit-level=high || echo "Vulnerabilities found - non blocking for now"
  allow_failure: true

unit_testing:
  stage: test
  script:
    - echo "Running Jest unit tests..."
    - npm run test:coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week

coverage_reporting:
  stage: coverage
  script:
    - echo "Reporting coverage results..."
    - npm run test:coverage
  coverage: '/All files\s*\|\s*([\d\.]+)/'


build_checking:
  stage: build
  script:
    - echo "Starting server briefly to confirm it boots..."
    - node ci-test.js

dependency_checking:
  stage: dependency_check
  script:
    - echo "Verifying required dependencies are installed..."
    - node test-deps.js

artifact_packaging:
  stage: artifact_package
  script:
    - echo "Packaging project files..."
    - node package.js
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

integration_checking:
  stage: integration_check
  script:
    - echo "Booting server and testing /api/health endpoint..."
    - node ci-test.js
  allow_failure: true

deploy_notifying:
  stage: deploy_notice
  script:
    - echo "Pipeline completed for MyDocVault"
    - echo "Branch -> $CI_COMMIT_REF_NAME"
    - echo "Commit -> $CI_COMMIT_SHORT_SHA"
    - echo "Live URL -> ${DEPLOYMENT_URL:-https://mydocvault.onrender.com}"
  environment:
    name: production
    url: ${DEPLOYMENT_URL:-https://mydocvault.onrender.com}
