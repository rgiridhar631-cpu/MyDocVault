# .gitlab-ci.yml - MyDocVault CI/CD Pipeline
# Cross-platform runner compatible (runs on Linux & Windows)

stages:
  - install
  - lint
  - syntax_check
  - security_audit
  - unit_test
  - build
  - dependency_check
  - artifact_package
  - integration_check
  - deploy_notice

install_dependencies:
  stage: install
  script:
    - echo "Installing dependencies..."
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint_code:
  stage: lint
  script:
    - echo "Checking JavaScript files for obvious issues..."
    - node syntax-check.js
  allow_failure: true

syntax_check:
  stage: syntax_check
  script:
    - echo "Verifying all JavaScript files parse correctly..."
    - node syntax-check.js

security_audit:
  stage: security_audit
  script:
    - echo "Running npm audit..."
    - npm audit --audit-level=high || echo "Vulnerabilities found - non blocking for now"
  allow_failure: true

unit_test:
  stage: unit_test
  script:
    - echo "Running unit tests..."
    - npm test || echo "No real test suite configured yet - informational only"
  allow_failure: true

build_check:
  stage: build
  script:
    - echo "Starting server briefly to confirm it boots..."
    - node ci-test.js

dependency_check:
  stage: dependency_check
  script:
    - echo "Verifying required dependencies are installed..."
    - node test-deps.js

artifact_package:
  stage: artifact_package
  script:
    - echo "Packaging project files..."
    - node package.js
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

integration_check:
  stage: integration_check
  script:
    - echo "Booting server and testing /api/health endpoint..."
    - node ci-test.js
  allow_failure: true

deploy_notice:
  stage: deploy_notice
  script:
    - echo "Pipeline completed for MyDocVault"
    - echo "Branch -> $CI_COMMIT_REF_NAME"
    - echo "Commit -> $CI_COMMIT_SHORT_SHA"
    - echo "Live URL -> ${DEPLOYMENT_URL:-https://mydocvault.onrender.com}"
  environment:
    name: production
    url: ${DEPLOYMENT_URL:-https://mydocvault.onrender.com}