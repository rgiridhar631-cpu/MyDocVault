# .gitlab-ci.yml - MyDocVault CI/CD Pipeline
# 10 stages, run on the project registered shell runner
stages:
  - install
  - lint
  - syntax_check
  - security_audit
  - unit_test
  - build
  - dependency_check
  - artifact_package
  - integration_check
  - deploy_notice

install_dependencies:
  stage: install
  script:
    - echo "Installing dependencies..."
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint_code:
  stage: lint
  script:
    - echo "Checking JavaScript files for obvious issues..."
    - for f in server.js script.js services/*.js; do [ -f "$f" ] && node --check "$f" && echo "OK $f" || echo "WARN $f"; done
  allow_failure: true

syntax_check:
  stage: syntax_check
  script:
    - echo "Verifying all JavaScript files parse correctly..."
    - find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

security_audit:
  stage: security_audit
  script:
    - echo "Running npm audit..."
    - npm audit --audit-level=high || echo "Vulnerabilities found - non blocking for now"
  allow_failure: true

unit_test:
  stage: unit_test
  script:
    - echo "Running unit tests..."
    - npm test || echo "No real test suite configured yet - informational only"
  allow_failure: true

build_check:
  stage: build
  script:
    - echo "Starting server briefly to confirm it boots..."
    - node server.js & SERVER_PID=$!; sleep 4; kill -0 $SERVER_PID && echo "Server started successfully" && kill $SERVER_PID || (echo "Server failed to start" && exit 1)

dependency_check:
  stage: dependency_check
  script:
    - echo "Verifying required dependencies are installed..."
    - test -d node_modules/express && echo "express present" || (echo "express missing" && exit 1)
    - test -d node_modules/cors && echo "cors present" || (echo "cors missing" && exit 1)

artifact_package:
  stage: artifact_package
  script:
    - echo "Packaging project files..."
    - mkdir -p dist
    - cp -r index.html style.css script.js server.js services package.json dist/ 2>/dev/null || true
    - echo "Packaged into dist/"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

integration_check:
  stage: integration_check
  script:
    - echo "Booting server and testing /api/health endpoint..."
    - node server.js & SERVER_PID=$!; sleep 4; RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || echo "000"); echo "Response code -> $RESPONSE"; kill $SERVER_PID 2>/dev/null || true
  allow_failure: true

deploy_notice:
  stage: deploy_notice
  script:
    - echo "Pipeline completed for MyDocVault"
    - echo "Branch -> $CI_COMMIT_REF_NAME"
    - echo "Commit -> $CI_COMMIT_SHORT_SHA"
    - echo "This project is not auto-deployed."
    - echo "Run node server.js locally to use it."