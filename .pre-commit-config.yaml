# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|json|css|md|html)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.(js|json)$

  - repo: https://github.com/webpro/knip
    rev: v5.22.0
    hooks:
      - id: knip

  - repo: https://github.com/pre-commit/mirrors-typescript
    rev: v5.0.0
    hooks:
      - id: tsc
        files: \.(js|ts)$
        args: [--noEmit]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: type-check
        name: TypeScript Compiler Check
        entry: npm run type-check
        language: system
        files: \.(js)$
        pass_filenames: false
